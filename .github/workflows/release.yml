name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Version must match vX.Y.Z (e.g. v1.1.0)"
            exit 1
          fi

      - name: Update SKILL.md version
        run: |
          VERSION=$(echo "${{ inputs.version }}" | sed 's/^v//')
          sed -i "s/^version: .*/version: ${VERSION}/" SKILL.md

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add SKILL.md
          git diff --staged --quiet || git commit -m "Release ${{ inputs.version }}"

      - name: Create tag
        run: |
          git tag -a "${{ inputs.version }}" -m "Release ${{ inputs.version }}"

      - name: Push
        run: |
          git push origin main
          git push origin "${{ inputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          generate_release_notes: true
